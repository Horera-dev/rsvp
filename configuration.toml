[settings]
font_path = "assets/Roboto-Black.ttf"
renderer = "gif"
masking_frames = 0

[settings.video]
width = 1020
height = 720
fps = 50.0
scale = 100.0
easing = "linear"

[settings.gif]
width = 720
height = 480
fps = 50.0
scale = 60.0
easing = "linear"

[spiral]
branches = 3.0
curvature = 0.10
smoothness = 0.01
lighter_color = 0.0
darker_color = 40.0
speed = 2.0
shrink_height = 2.0
clockwise = false

