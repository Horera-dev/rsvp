# .github/workflows/release.yml
name: Release

on:
  push:
    tags:
      - 'v*'   # triggers on v1.0.0, v1.2.3, etc.
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: rsvp-generator.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: rsvp-generator
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: rsvp-generator

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          mkdir release
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} release/
          cp configuration.toml release/
          cp -r assets/ release/
          # Add ffmpeg for each platform here
          cd release && zip -r ../rsvp-${{ matrix.target }}.zip .

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: rsvp-${{ matrix.target }}.zip
